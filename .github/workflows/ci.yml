name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system libs for OpenCV
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        # pyproject addopts already excludes gpu/ros/network markers,
        # so CI needs no CUDA, no ROS, and no network weight downloads.
        run: pytest
